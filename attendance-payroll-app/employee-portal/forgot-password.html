<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Forgot Password | Employee Portal</title>
<link rel="stylesheet" href="../css/style.css" />
<link rel="stylesheet" href="../css/responsive.css" />
<link rel="stylesheet" href="../css/auth-brand.css" />
</head>
<body>

<div class="split-auth-page">

  <div class="split-auth-brand">
    <div class="split-auth-logo-box">
      <img src="../assets/branding/logo.jpeg" alt="Liqvigreen" />
    </div>
    <h1>Employee Portal</h1>
    <p class="brand-company">Liqvigreen</p>
    <p class="brand-tagline">Fueling Sustainability</p>
  </div>

  <div class="split-auth-form-side">
    <div class="split-auth-form-wrap">
      <h2>Reset your password</h2>
      <p class="form-subtitle">Enter your portal email and we'll send you a reset link.</p>

      <form id="emp-forgot-form">
        <div class="form-group">
          <label for="emp-forgot-email">Email Address</label>
          <input class="form-control" type="email" id="emp-forgot-email" placeholder="you@company.com" required />
        </div>
        <p id="emp-forgot-msg" class="form-hint"></p>
        <button class="btn-brand" type="submit">Send Reset Link</button>
        <div style="text-align:center; margin-top:18px;">
          <a class="link-primary" href="index.html">&larr; Back to login</a>
        </div>
      </form>
    </div>
  </div>

</div>

<script type="module" src="js/employee-auth.js"></script>
</body>
</html>
