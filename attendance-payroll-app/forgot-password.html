<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Forgot Password | Liqvigreen</title>
<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="css/responsive.css" />
<link rel="stylesheet" href="css/auth-brand.css" />
</head>
<body>

<div class="split-auth-page">

  <div class="split-auth-brand">
    <div class="split-auth-logo-box">
      <img src="assets/branding/logo.jpeg" alt="Liqvigreen" />
    </div>
    <h1>HR Management</h1>
    <p class="brand-company">Liqvigreen</p>
    <p class="brand-tagline">Fueling Sustainability</p>

    <div class="brand-feature-grid">
      <div class="brand-feature-item"><span class="brand-feature-dot"></span> Employee Management</div>
      <div class="brand-feature-item"><span class="brand-feature-dot"></span> Attendance Tracking</div>
      <div class="brand-feature-item"><span class="brand-feature-dot"></span> Payroll Processing</div>
      <div class="brand-feature-item"><span class="brand-feature-dot"></span> Performance Reviews</div>
    </div>
  </div>

  <div class="split-auth-form-side">
    <div class="split-auth-form-wrap">
      <h2>Reset your password</h2>
      <p class="form-subtitle">Enter your admin email and we'll send you a reset link.</p>

      <form id="forgot-form">
        <div class="form-group">
          <label for="forgot-email">Email Address</label>
          <input class="form-control" type="email" id="forgot-email" placeholder="you@company.com" required />
        </div>
        <p id="forgot-msg" class="form-hint"></p>
        <button class="btn-brand" type="submit">Send Reset Link</button>
        <div style="text-align:center; margin-top:18px;">
          <a class="link-primary" href="index.html">&larr; Back to login</a>
        </div>
      </form>

      <p class="split-auth-footer">Liqvigreen © 2026</p>
    </div>
  </div>

</div>

<script type="module" src="js/auth.js"></script>
</body>
</html>
